<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Licencia PRO</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  margin-bottom: 20px;
}

h2 { text-align:center; }

.question { margin-bottom:20px; }

.option {
  display:block;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
  cursor:pointer;
  transition:0.2s;
}

.option:hover { background:#f1f1f1; }

.selected { background:#fff3cd !important; } /* amarillo suave */
.correct { background:#c8f7c5 !important; }
.incorrect { background:#f7c5c5 !important; }

button {
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:5px;
  font-weight:bold;
}

.primary { background:#1976d2; color:white; }
.secondary { background:#9e9e9e; color:white; }

.grid {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:15px;
}

.grid div {
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  font-weight:bold;
}

.green { background:#c8f7c5; }
.red { background:#f7c5c5; }

.hidden { display:none; }

.resultBox {
  text-align:center;
  font-size:18px;
}
</style>
</head>

<body>
<div class="container">

<div id="quizView" class="card">
<h2>Simulador de Examen</h2>
<div id="quiz"></div>

<button class="primary" onclick="submitQuiz()">Finalizar</button>
<button class="secondary" onclick="restart()">Reiniciar</button>

<div id="result" class="resultBox"></div>

<button class="primary" onclick="goToReview()">Ver Respuestas</button>
<button class="primary" onclick="takeScreenshot()">Descargar Resultado 📸</button>
</div>

<div id="reviewView" class="card hidden">
<h2>Revisión de Respuestas</h2>
<div id="reviewSection"></div>

<button class="primary" onclick="backToQuiz()">Volver al examen</button>
</div>

</div>

let shuffled = [];
let userAnswers = [];
let locked = false;

function shuffleQuestions(){
  shuffled = [...questions].sort(() => Math.random() - 0.5);
}

function loadQuiz(){
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  shuffled.forEach((q,i)=>{
    let div = document.createElement("div");
    div.classList.add("question");
    div.innerHTML = `<b>${i+1}. ${q.q}</b>`;

    q.options.forEach((opt,j)=>{
      let optDiv = document.createElement("div");
      optDiv.classList.add("option");
      optDiv.innerText = opt;

      optDiv.onclick = () => {
        if(locked) return;
        if(!userAnswers[i]) userAnswers[i] = [];

        if(userAnswers[i].includes(j)){
          userAnswers[i] = userAnswers[i].filter(x => x !== j);
          optDiv.classList.remove("selected");
        } else {
          userAnswers[i].push(j);
          optDiv.classList.add("selected");
        }
      };

      div.appendChild(optDiv);
    });

    quiz.appendChild(div);
  });
}

function submitQuiz(){
  locked = true;
  let correct = 0;

  shuffled.forEach((q,i)=>{
    if(JSON.stringify((userAnswers[i]||[]).sort()) === JSON.stringify(q.answer.sort())) correct++;
  });

  let errors = shuffled.length - correct;
  let percent = Math.round((correct/shuffled.length)*100);

  let good = ["¡Excelente!","Muy bien","Casi perfecto","¡Sigue así!","Gran trabajo"];
  let bad = ["No te rindas","Sigue intentando","Tú puedes","Ánimo","La próxima será mejor"];

  let msg = errors > 3
    ? bad[Math.floor(Math.random()*bad.length)]
    : good[Math.floor(Math.random()*good.length)];

  document.getElementById("result").innerHTML = `
    <p><b>Puntaje:</b> ${percent}%</p>
    <p><b>Aciertos:</b> ${correct} de ${shuffled.length}</p>
    <p>${msg}</p>
  `;
}

function goToReview(){
  document.getElementById("quizView").classList.add("hidden");
  document.getElementById("reviewView").classList.remove("hidden");
  review();
}

function backToQuiz(){
  document.getElementById("quizView").classList.remove("hidden");
  document.getElementById("reviewView").classList.add("hidden");
}

function review(){
  const section = document.getElementById("reviewSection");
  section.innerHTML = "";

  let grid = document.createElement("div");
  grid.classList.add("grid");

  shuffled.forEach((q,i)=>{
    let box = document.createElement("div");
    if(JSON.stringify((userAnswers[i]||[]).sort()) === JSON.stringify(q.answer.sort())){
      box.classList.add("green");
    } else {
      box.classList.add("red");
    }
    box.innerText = i+1;
    grid.appendChild(box);

    let reviewQ = document.createElement("div");
    reviewQ.classList.add("question");
    reviewQ.innerHTML = `<b>${i+1}. ${q.q}</b>`;

    q.options.forEach((opt,j)=>{
      let optDiv = document.createElement("div");
      optDiv.classList.add("option");
      optDiv.innerText = opt;

      if(q.answer.includes(j)) optDiv.classList.add("correct");
      if((userAnswers[i]||[]).includes(j) && !q.answer.includes(j)) optDiv.classList.add("incorrect");

      reviewQ.appendChild(optDiv);
    });

    section.appendChild(reviewQ);
  });

  section.appendChild(grid);
}

function restart(){
  locked = false;
  userAnswers = [];
  shuffleQuestions();
  document.getElementById("result").innerHTML = "";
  backToQuiz();
  loadQuiz();
}

shuffleQuestions();
loadQuiz();
</script>

<!-- Librería para capturas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
function takeScreenshot(){
  const result = document.getElementById("result");

  if(!result.innerText.trim()){
    alert("Primero debes finalizar el examen");
    return;
  }

  html2canvas(result).then(canvas => {
    let link = document.createElement('a');
    link.download = 'resultado_examen.png';
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
