      "Sin luces",
      "Usar luces adecuadas",
      "Acelerar",
      "Cerrar ojos"
    ],
    correct: 1
  },
  {
    type: "multiple",
    question: "¿Qué hacer si hay obras en la vía?",
    options: [
      "Ignorar",
      "Seguir señalización",
      "Acelerar",
      "Adelantar"
    ],
    correct: 1
  },
  {
    type: "multiple",
    question: "¿Qué hacer si un semáforo cambia a rojo?",
    options: [
      "Acelerar",
      "Detenerse",
      "Ignorar",
      "Retroceder"
    ],
    correct: 1
  }

];

let selectedQuestions = [];
const STORAGE_KEY = "quiz_progreso";

// 🔀 MEZCLAR Y TOMAR 30 PREGUNTAS
function getRandomQuestions(array, num){
  let shuffled = [...array].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, num);
}

// 💾 GUARDAR PROGRESO
function saveProgress(){
  let answers = [];

  selectedQuestions.forEach((q,i)=>{
    const selected = document.querySelector(`input[name='q${i}']:checked`);
    answers[i] = selected ? parseInt(selected.value) : null;
  });

  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    questions: selectedQuestions,
    answers: answers
  }));
}

// 📥 CARGAR PROGRESO
function loadProgress(){
  let data = localStorage.getItem(STORAGE_KEY);
  if(data){
    return JSON.parse(data);
  }
  return null;
}

// MOSTRAR PREGUNTAS
function loadQuiz(){
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  let saved = loadProgress();

  if(saved){
    selectedQuestions = saved.questions;
  }else{
    selectedQuestions = getRandomQuestions(questions, 30);
  }

  selectedQuestions.forEach((q,i)=>{
    let html = `<div class='card'><p><b>${i+1}. ${q.question}</b></p>`;

    if(q.type === "multiple"){
      q.options.forEach((opt,index)=>{
        html += `<label>
          <input type='radio' name='q${i}' value='${index}' onchange='saveProgress()'>
          ${opt}
        </label><br>`;
      });
    }

    html += `</div>`;
    quiz.innerHTML += html;
  });

  // 🔁 RESTAURAR RESPUESTAS
  if(saved){
    saved.answers.forEach((ans,i)=>{
      if(ans !== null){
        let input = document.querySelector(`input[name='q${i}'][value='${ans}']`);
        if(input) input.checked = true;
      }
    });
  }
}

loadQuiz();

// CORREGIR
function submitQuiz(){
  let score = 0;
  let total = selectedQuestions.length;

  selectedQuestions.forEach((q,i)=>{
    const selected = document.querySelector(`input[name='q${i}']:checked`);
    let userAnswer = selected ? parseInt(selected.value) : null;

    if(userAnswer === q.correct){
      score++;
    }
  });

  let percentage = Math.round((score / total) * 100);
  let aprobado = percentage >= 80;

  document.getElementById("result").innerHTML = `
    <div class='card result'>
      <h2>${aprobado ? "✅ APROBADO" : "❌ REPROBADO"}</h2>
      <p><b>${percentage}%</b> — acertaste ${score} de ${total}</p>
    </div>
  `;

  // 💾 GUARDAR RESULTADO FINAL
  db.collection("resultados").add({
    fecha: new Date(),
    puntaje: score,
    total: total,
    porcentaje: percentage,
    aprobado: aprobado
  });

  // 🧹 OPCIONAL: borrar progreso al terminar
  localStorage.removeItem(STORAGE_KEY);
  
}

</script>
